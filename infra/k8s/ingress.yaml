# NGINX Ingress — routes all external traffic through one IP.
#
# Prerequisites (run once on the cluster):
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.8.2/deploy/static/provider/cloud/deploy.yaml
#   kubectl get svc -n ingress-nginx ingress-nginx-controller --watch   # wait for EXTERNAL-IP
#
# After the ingress IP is assigned, users access the app at that IP (not the old UI LoadBalancer IP).
# The /ws/ path routes browser WebSocket frames directly to the backend — no WebRTC needed.
#
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adaptive-inference-ingress
  namespace: adaptive-inference
  annotations:
    kubernetes.io/ingress.class: nginx
    # Long timeouts for persistent WebSocket connections
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Allow large base64 JPEG frames
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Force HTTP/1.1 upstream (required for WebSocket upgrade)
    # Do NOT add configuration-snippet for Upgrade/Connection — the NGINX
    # ingress controller already adds them via its built-in WebSocket support.
    # Adding them again in a snippet doubles the header and breaks the handshake.
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  rules:
    - http:
        paths:
          # Browser camera WebSocket — frames go direct to backend (bypasses Streamlit)
          - path: /ws/
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          # Backend REST / health / metrics
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          # Streamlit UI — catch-all
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ui-service
                port:
                  number: 80
