# FastAPI inference backend — CPU mode (GPU node pool not yet provisioned).
# Probe timeline on a cold start:
#   startupProbe  : tries every 5s for up to 10 min (model loading)
#   readinessProbe: starts after startupProbe succeeds, gates traffic
#   livenessProbe : runs throughout; restarts pod on repeated failure
#
# To enable GPU: add a GPU node pool, uncomment nodeSelector + tolerations,
# and restore nvidia.com/gpu resource requests. Set INFERENCE_DEVICE=cuda.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: adaptive-inference
  labels:
    app: backend
spec:
  replicas: 1
  strategy:
    type: Recreate   # Kill old pod first, then start new — avoids scheduling deadlock on single node
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      terminationGracePeriodSeconds: 60

      # GPU node pool not yet provisioned — running on CPU.
      # Uncomment when GPU node pool is added:
      # nodeSelector:
      #   cloud.google.com/gke-accelerator: nvidia-tesla-t4
      # tolerations:
      #   - key: nvidia.com/gpu
      #     operator: Exists
      #     effect: NoSchedule

      containers:
        - name: adaptive-inference
          image: ghcr.io/hemanth1403/ie7374-mlops-adaptive-ml-inference/adaptive-inference:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8501
              name: streamlit

          envFrom:
            - configMapRef:
                name: adaptive-inference-config

          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "1"
              memory: "4Gi"

          volumeMounts:
            - name: model-weights
              mountPath: /app/models

          # Startup probe: waits for model loading (up to 10 minutes)
          startupProbe:
            httpGet:
              path: /health/startup
              port: 8000
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 120

          # Readiness probe: gates traffic; fails during SIGTERM drain
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            periodSeconds: 5
            failureThreshold: 2
            successThreshold: 1

          # Liveness probe: restarts pod if engine becomes unresponsive
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

      volumes:
        - name: model-weights
          persistentVolumeClaim:
            claimName: model-weights-pvc
