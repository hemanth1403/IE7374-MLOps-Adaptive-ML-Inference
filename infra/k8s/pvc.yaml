# PersistentVolumeClaim for YOLO weights and PPO model.
# Uses GKE's standard-rwo (ReadWriteOnce, SSD-backed).
# Pre-populate this volume with model files before starting the backend pod:
#   kubectl cp yolov8n.pt adaptive-inference/<init-pod>:/app/models/
#   kubectl cp yolov8s.pt adaptive-inference/<init-pod>:/app/models/
#   kubectl cp yolov8l.pt adaptive-inference/<init-pod>:/app/models/
#   kubectl cp models/PPO_v6/final_adaptive_model.zip adaptive-inference/<init-pod>:/app/models/PPO_v6/
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-weights-pvc
  namespace: adaptive-inference
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard-rwo
  resources:
    requests:
      storage: 10Gi
---
# Separate smaller PVC for MLflow SQLite backend store
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-db-pvc
  namespace: adaptive-inference
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard-rwo
  resources:
    requests:
      storage: 2Gi
