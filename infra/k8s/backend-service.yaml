# Internal ClusterIP service for the FastAPI backend.
# WebSocket connections from Streamlit pods use this DNS name:
#   ws://backend-service:8000/ws/stream
# External traffic is routed via the Ingress.
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: adaptive-inference
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
