name: Model Pipeline CI

on:
  push:
    paths:
      - "model_pipeline/**"
      - "Data-Pipeline/**"
      - ".github/workflows/model-pipeline-ci.yml"
  pull_request:
    paths:
      - "model_pipeline/**"
      - "Data-Pipeline/**"
      - ".github/workflows/model-pipeline-ci.yml"
  workflow_dispatch:

jobs:
  model-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r model_pipeline/requirements.txt
          pip install "dvc[gs]" mlflow==2.10.2 packaging==23.2 setuptools==69.5.1

      - name: Write GCP credentials file
        run: |
          mkdir -p Data-Pipeline/keys
          cat > Data-Pipeline/keys/rl_orchestration.json <<'EOF'
          ${{ secrets.GCP_DVC_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Configure DVC credential path
        working-directory: Data-Pipeline
        run: |
          python -m dvc remote modify --local origin credentialpath keys/rl_orchestration.json
          python -m dvc pull

      - name: Run pretrained evaluation
        run: |
          python model_pipeline/src/evaluation/evaluate.py

      - name: Run comparison reports
        run: |
          python model_pipeline/src/evaluation/compare_models.py
          python model_pipeline/src/evaluation/generate_slice_comparison.py
          python model_pipeline/src/bias/generate_bias_report.py

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: model-pipeline-reports
          path: |
            model_pipeline/reports/metrics/
            model_pipeline/reports/figures/
            model_pipeline/reports/bias/

      - name: Clean up credentials file
        if: always()
        run: rm -f Data-Pipeline/keys/rl_orchestration.json