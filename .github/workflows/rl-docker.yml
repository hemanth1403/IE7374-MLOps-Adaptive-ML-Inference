name: RL Docker Build & Push

on:
  push:
    branches: [ "main" ]
    paths:
      - "model_pipeline/src/RL/**"
      - ".github/workflows/rl-docker.yml"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # needed for GHCR push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Free up runner disk space — the CUDA base image is large
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive a clean image name from the repo (lowercase required by GHCR)
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/adaptive-inference
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: model_pipeline/src/RL
          file: model_pipeline/src/RL/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache: reuse previous build layers across runs
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Print image digest
        run: echo "Image pushed — ${{ steps.meta.outputs.tags }}"
