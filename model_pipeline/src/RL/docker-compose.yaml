version: '3.8'

services:
  model-dev:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: adaptive_ml_dev
    volumes:
      - .:/app
      - ./data:/app/data  # Mount your DVC-processed data
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    stdin_open: true
    tty: true
    command: /bin/bash